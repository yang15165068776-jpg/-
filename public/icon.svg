<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Chat bubble -->
  <g transform="translate(256,240)">
    <!-- Bubble body -->
    <rect x="-130" y="-100" width="260" height="180" rx="36" fill="url(#accent)" opacity="0.9"/>
    <!-- Bubble tail -->
    <path d="M-80,80 L-100,130 L-50,85 Z" fill="url(#accent)" opacity="0.9"/>
    <!-- Dots (typing indicator) -->
    <circle cx="-40" cy="0" r="12" fill="#fff" opacity="0.9"/>
    <circle cx="10" cy="0" r="12" fill="#fff" opacity="0.7"/>
    <circle cx="60" cy="0" r="12" fill="#fff" opacity="0.5"/>
  </g>
  <!-- Character silhouette -->
  <g transform="translate(256,380)">
    <circle cx="0" cy="-40" r="28" fill="#fff" opacity="0.25"/>
    <ellipse cx="0" cy="10" rx="40" ry="30" fill="#fff" opacity="0.2"/>
  </g>
</svg>
